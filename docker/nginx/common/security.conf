# ==================================================
# Security Rules
# ==================================================

# Block hidden files except .well-known
location ~ /\.(?!well-known/) {
    deny all;
    access_log off;
    log_not_found off;
}


# Block PHP execution in uploads/files
location ~* /(?:uploads|files)/.*\.php$ {
    deny all;
}


# Block sensitive WordPress files
location ~* /(wp-config\.php|readme\.html|license\.txt)$ {
    deny all;
}


# Block configuration, backup, and log files
location ~* \.(?:sql|log|ini|conf|bak|old|orig|save|swp|dist)$ {
    deny all;
}


# Block package manager metadata
location ~* /(?:composer\.(?:json|lock)|package(?:-lock)?\.json|yarn\.lock)$ {
    deny all;
}