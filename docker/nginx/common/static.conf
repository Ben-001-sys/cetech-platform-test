# ==================================================
# Static Asset Caching
# ==================================================

# CSS & JavaScript
location ~* \.(?:css|js|mjs)$ {
    expires 1h;
    add_header Cache-Control "public, max-age=3600";
    access_log off;
    try_files $uri =404;
}


# Images & Fonts
location ~* \.(?:jpg|jpeg|gif|png|webp|avif|svg|ico|woff|woff2|ttf|otf)$ {
    expires 1h;
    add_header Cache-Control "public, max-age=3600";
    access_log off;
    try_files $uri =404;
}