# ==================================================
# PHP-FPM Upstream
# ==================================================

upstream blog_php {
    server blog-php:9000;
    keepalive 16;
}


# ==================================================
# Blog Site
# ==================================================

server {

    listen 8080;
    server_name _;

    root /var/www/html;
    index index.php index.html;

    client_max_body_size 256m;


    # --------------------------------------------------
    # Health Check
    # --------------------------------------------------

    location = /healthz {
        access_log off;
        default_type text/plain;

        return 200 "blog-nginx-ok\n";
    }


    # --------------------------------------------------
    # PHP-FPM Health Check
    # --------------------------------------------------

    location = /fpm-ping {
        include fastcgi_params;

        fastcgi_param SCRIPT_FILENAME /fpm-ping;
        fastcgi_param SCRIPT_NAME /fpm-ping;

        fastcgi_pass blog_php;
    }


    # --------------------------------------------------
    # Disable XML-RPC
    # --------------------------------------------------

    location = /en/xmlrpc.php {
        return 403;
    }


    # --------------------------------------------------
    # Redirect
    # --------------------------------------------------

    location = /en {
        return 308 /en/;
    }


    # --------------------------------------------------
    # WordPress Front Controller
    # --------------------------------------------------

    location /en/ {
        try_files $uri $uri/ /en/index.php?$args;
    }


    # --------------------------------------------------
    # PHP Processing
    # --------------------------------------------------

    location ~ ^/en/.*\.php$ {

        try_files $uri =404;

        include fastcgi_params;

        fastcgi_param SCRIPT_FILENAME         $document_root$fastcgi_script_name;
        fastcgi_param SCRIPT_NAME             $fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT           $document_root;

        fastcgi_param HTTP_AUTHORIZATION      $http_authorization;
        fastcgi_param HTTP_X_REQUEST_ID       $http_x_request_id;
        fastcgi_param HTTP_X_FORWARDED_FOR    $http_x_forwarded_for;
        fastcgi_param HTTP_X_FORWARDED_HOST   $http_x_forwarded_host;
        fastcgi_param HTTP_X_FORWARDED_PORT   $http_x_forwarded_port;
        fastcgi_param HTTP_X_FORWARDED_PROTO  $http_x_forwarded_proto;
        fastcgi_param HTTP_X_FORWARDED_PREFIX /en;

        fastcgi_param HTTPS on;
        fastcgi_param SERVER_PORT 443;

        fastcgi_connect_timeout 5s;
        fastcgi_send_timeout 180s;
        fastcgi_read_timeout 180s;

        fastcgi_buffer_size 64k;
        fastcgi_buffers 16 64k;
        fastcgi_busy_buffers_size 128k;

        fastcgi_pass blog_php;
    }


    # --------------------------------------------------
    # Shared Configuration
    # --------------------------------------------------

    include /etc/nginx/snippets/security.conf;
    include /etc/nginx/snippets/static.conf;
}