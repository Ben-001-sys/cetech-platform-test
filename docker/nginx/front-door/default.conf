# ==================================================
# Upstream Backends
# ==================================================

upstream corporate_backend {
    server corporate-nginx:8080;
    keepalive 32;
}

upstream store_backend {
    server store-nginx:8080;
    keepalive 32;
}

upstream blog_backend {
    server blog-nginx:8080;
    keepalive 32;
}


# ==================================================
# Forwarded Protocol Mapping
# ==================================================

map $http_x_forwarded_proto $cetech_forwarded_proto {
    default https;
    http    http;
    https   https;
}


# ==================================================
# Front Door
# ==================================================

server {

    listen 8080 default_server;

    server_name
        cetech.test
        www.cetech.test;

    client_max_body_size 256m;


    # --------------------------------------------------
    # Health Check
    # --------------------------------------------------

    location = /healthz {
        access_log off;
        default_type text/plain;

        return 200 "front-door-ok\n";
    }


    # --------------------------------------------------
    # Redirects
    # --------------------------------------------------

    location = /gh {
        return 308 /gh/;
    }

    location = /en {
        return 308 /en/;
    }


    # --------------------------------------------------
    # Store Site (/gh)
    # --------------------------------------------------

    location ^~ /gh/ {

        proxy_http_version 1.1;

        proxy_set_header Host                $host;
        proxy_set_header X-Request-ID        $request_id;
        proxy_set_header X-Real-IP           $remote_addr;
        proxy_set_header X-Forwarded-For     $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host    $host;
        proxy_set_header X-Forwarded-Port    443;
        proxy_set_header X-Forwarded-Proto   $cetech_forwarded_proto;
        proxy_set_header X-Forwarded-Prefix  /gh;

        proxy_set_header Upgrade             $http_upgrade;
        proxy_set_header Connection          $connection_upgrade;

        proxy_connect_timeout 5s;
        proxy_send_timeout 180s;
        proxy_read_timeout 180s;

        proxy_request_buffering on;
        proxy_buffering on;

        proxy_buffers 16 64k;
        proxy_buffer_size 64k;
        proxy_busy_buffers_size 128k;

        proxy_pass http://store_backend;
    }


    # --------------------------------------------------
    # Blog Site (/en)
    # --------------------------------------------------

    location ^~ /en/ {

        proxy_http_version 1.1;

        proxy_set_header Host                $host;
        proxy_set_header X-Request-ID        $request_id;
        proxy_set_header X-Real-IP           $remote_addr;
        proxy_set_header X-Forwarded-For     $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host    $host;
        proxy_set_header X-Forwarded-Port    443;
        proxy_set_header X-Forwarded-Proto   $cetech_forwarded_proto;
        proxy_set_header X-Forwarded-Prefix  /en;

        proxy_set_header Upgrade             $http_upgrade;
        proxy_set_header Connection          $connection_upgrade;

        proxy_connect_timeout 5s;
        proxy_send_timeout 180s;
        proxy_read_timeout 180s;

        proxy_request_buffering on;
        proxy_buffering on;

        proxy_buffers 16 64k;
        proxy_buffer_size 64k;
        proxy_busy_buffers_size 128k;

        proxy_pass http://blog_backend;
    }


    # --------------------------------------------------
    # Corporate Site (/)
    # --------------------------------------------------

    location / {

        proxy_http_version 1.1;

        proxy_set_header Host                $host;
        proxy_set_header X-Request-ID        $request_id;
        proxy_set_header X-Real-IP           $remote_addr;
        proxy_set_header X-Forwarded-For     $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host    $host;
        proxy_set_header X-Forwarded-Port    443;
        proxy_set_header X-Forwarded-Proto   $cetech_forwarded_proto;
        proxy_set_header X-Forwarded-Prefix  "";

        proxy_set_header Upgrade             $http_upgrade;
        proxy_set_header Connection          $connection_upgrade;

        proxy_connect_timeout 5s;
        proxy_send_timeout 180s;
        proxy_read_timeout 180s;

        proxy_request_buffering on;
        proxy_buffering on;

        proxy_buffers 16 64k;
        proxy_buffer_size 64k;
        proxy_busy_buffers_size 128k;

        proxy_pass http://corporate_backend;
    }
}